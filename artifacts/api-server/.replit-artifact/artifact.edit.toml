kind = "api"
  previewPath = "/api"
  title = "API Server"
  version = "1.0.0"
  id = "3B4_FFSkEVBkAeYMFRJ2e"

  [[services]]
  localPort = 8080
  name = "API Server"
  paths = ["/api", "/socket.io"]

  [services.development]
  run = "npm run dev -w @workspace/api-server"

  [services.production]

  [services.production.build]
  args = ["npm", "run", "build", "-w", "@workspace/api-server"]

  [services.production.build.env]
  NODE_ENV = "production"

  [services.production.run]
  args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

  [services.production.run.env]
  PORT = "8080"
  NODE_ENV = "production"

  [services.production.health.startup]
  path = "/api/healthz"
  