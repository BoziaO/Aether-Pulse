openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AetherPulse API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User profile operations
  - name: rooms
    description: Room management
  - name: messages
    description: Chat messages

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
        "409":
          description: Username already taken

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          description: Forbidden

  /rooms:
    get:
      operationId: listRooms
      tags: [rooms]
      summary: List current user's rooms
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
    post:
      operationId: createRoom
      tags: [rooms]
      summary: Create a new room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /rooms/{roomId}:
    get:
      operationId: getRoom
      tags: [rooms]
      summary: Get room details
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Room details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "404":
          description: Room not found
    delete:
      operationId: deleteRoom
      tags: [rooms]
      summary: Delete a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /rooms/{roomId}/join:
    post:
      operationId: joinRoom
      tags: [rooms]
      summary: Join a room by invite code
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinRoomInput"
      responses:
        "200":
          description: Joined room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "403":
          description: Invalid invite code
        "404":
          description: Room not found

  /rooms/join-by-code:
    post:
      operationId: joinRoomByCode
      tags: [rooms]
      summary: Join a room using only an invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinRoomInput"
      responses:
        "200":
          description: Joined room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "403":
          description: Invalid invite code
        "404":
          description: Room not found

  /rooms/{roomId}/leave:
    post:
      operationId: leaveRoom
      tags: [rooms]
      summary: Leave a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Left room

  /rooms/{roomId}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: Get chat messages for a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a chat message
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /rooms/{roomId}/activity:
    get:
      operationId: getRoomActivity
      tags: [rooms]
      summary: Get room activity summary (member count, recent events)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Room activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomActivity"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterInput:
      type: object
      required: [username, password, displayName]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
        password:
          type: string
          minLength: 6
        displayName:
          type: string
          minLength: 1
          maxLength: 32

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, displayName, status, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        status:
          type: string
          enum: [online, away, busy, offline]
        customStatus:
          type: ["string", "null"]
        accentColor:
          type: ["string", "null"]
        badges:
          type: array
          items:
            type: string
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        customStatus:
          type: string
        accentColor:
          type: string
        status:
          type: string
          enum: [online, away, busy, offline]

    Room:
      type: object
      required: [id, name, inviteCode, ownerId, memberCount, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        inviteCode:
          type: string
        ownerId:
          type: integer
        memberCount:
          type: integer
        members:
          type: array
          items:
            $ref: "#/components/schemas/User"
        quality:
          type: string
          enum: [360p, 480p, 720p, 1080p, 1440p]
        isActive:
          type: boolean
        createdAt:
          type: string

    RoomInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        quality:
          type: string
          enum: [360p, 480p, 720p, 1080p, 1440p]

    JoinRoomInput:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string

    Message:
      type: object
      required: [id, roomId, userId, content, type, createdAt]
      properties:
        id:
          type: integer
        roomId:
          type: string
        userId:
          type: integer
        content:
          type: string
        type:
          type: string
          enum: [text, system, file]
        user:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000
        type:
          type: string
          enum: [text, file]

    RoomActivity:
      type: object
      required: [roomId, memberCount, messageCount, events]
      properties:
        roomId:
          type: string
        memberCount:
          type: integer
        messageCount:
          type: integer
        events:
          type: array
          items:
            $ref: "#/components/schemas/ActivityEvent"

    ActivityEvent:
      type: object
      required: [type, description, createdAt]
      properties:
        type:
          type: string
        description:
          type: string
        userId:
          type: ["integer", "null"]
        createdAt:
          type: string
