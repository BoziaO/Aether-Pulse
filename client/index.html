<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>AetherPulse - Voice, Chat & Streamy</title>
    <meta
      name="description"
      content="AetherPulse — prywatna przestrzeń do rozmów głosowych, czatów i streamów. Dołącz i ciesz się doskonałą jakością dźwięku i obrazu."
    />
    <meta name="keywords" content="voice chat, streaming, realtime, WebRTC, komunikacja, rozmawy grupowe" />
    <meta name="author" content="AetherPulse" />

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="AetherPulse - Voice, Chat & Streamy" />
    <meta property="og:description" content="Prywatne pokoje głosowe, chat realtime, stream z kamery lub ekranu" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/logo.png" />
    <meta property="og:site_name" content="AetherPulse" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AetherPulse - Voice, Chat & Streamy" />
    <meta name="twitter:description" content="Prywatne pokoje głosowe, chat realtime, stream z kamery lub ekranu" />
    <meta name="twitter:image" content="/icons/logo.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#070a13" />
    <meta name="background-color" content="#070a13" />

    <!-- Favicon -->
    <link rel="icon" href="/icons/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/logo.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icons/logo.png" sizes="512x512" />

    <!-- Fonts with display=swap for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Resource hints for better performance -->
    <link rel="prefetch" href="/src/main.ts" as="script" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Disable automatic phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Security headers (injected at build time via Vite) -->
    <meta http-equiv="Content-Security-Policy" content="%CSP_POLICY%" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <!-- Style for critical CSS -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        background: #070a13;
        color: #e2e8f0;
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
      }

      #app {
        min-height: 100vh;
      }

      /* Loading fallback */
      .loading-fallback {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #070a13;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #67e8f9;
        font-size: 18px;
      }

      /* Hide until app loads for better CLS */
      body.app-loaded #app {
        opacity: 1;
        transition: opacity 0.3s ease;
      }

      body.app-loaded .loading-fallback {
        display: none;
      }

      #app {
        opacity: 0;
      }
    </style>

    <!-- Critical CSS inline for better performance -->
    <script>
      // Mark app as loaded when ready
      document.addEventListener('DOMContentLoaded', function () {
        document.body.classList.add('app-loaded')
      })

      // Service worker registration for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js')
            .then((registration) => {
              console.log('ServiceWorker registration successful')
            })
            .catch((err) => {
              console.log('ServiceWorker registration failed: ', err)
            })
        })
      }
    </script>
  </head>
  <body>
    <div class="loading-fallback">Ładowanie AetherPulse...</div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
