<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Nicori - Voice, Chat & Streamy</title>
    <meta
      name="description"
      content="Nicori — prywatna przestrzeń do rozmów głosowych, czatów i streamów. Dołącz i ciesz się doskonałą jakością dźwięku i obrazu."
    />
    <meta name="keywords" content="voice chat, streaming, realtime, WebRTC, komunikacja, rozmawy grupowe" />
    <meta name="author" content="Nicori" />

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Nicori - Voice, Chat & Streamy" />
    <meta property="og:description" content="Prywatne pokoje głosowe, chat realtime, stream z kamery lub ekranu" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/logo.png" />
    <meta property="og:site_name" content="Nicori" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nicori - Voice, Chat & Streamy" />
    <meta name="twitter:description" content="Prywatne pokoje głosowe, chat realtime, stream z kamery lub ekranu" />
    <meta name="twitter:image" content="/icons/logo.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0F1018" />
    <meta name="background-color" content="#0F1018" />

    <!-- Favicon -->
    <link rel="icon" href="/icons/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/logo.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icons/logo.png" sizes="512x512" />

    <!-- Fonts with display=swap for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      />
    </noscript>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Disable automatic phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Security headers (injected at build time via Vite) -->
    <meta http-equiv="Content-Security-Policy" content="%CSP_POLICY%" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        min-height: 100%;
        background: #0F1018;
        color: #F5F4FF;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overflow: hidden;
      }

      #app { min-height: 100vh; }

      /* ── Loading Screen ── */
      .loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        background: #0F1018;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }

      .loading-logo {
        position: relative;
        width: 72px;
        height: 72px;
      }

      .loading-logo img {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        object-fit: cover;
      }

      .loading-logo .loading-ring {
        position: absolute;
        inset: -6px;
        border-radius: 24px;
        border: 2px solid transparent;
        border-top-color: #B7A7FF;
        border-right-color: #FFB7D5;
        animation: loading-spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      }

      @keyframes loading-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .loading-text {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .loading-title {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #B7A7FF, #FFB7D5);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .loading-dots {
        display: flex;
        gap: 6px;
      }

      .loading-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #8E93A8;
        animation: loading-bounce 1.4s ease-in-out infinite;
      }

      .loading-dots span:nth-child(2) { animation-delay: 0.16s; }
      .loading-dots span:nth-child(3) { animation-delay: 0.32s; }

      @keyframes loading-bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }

      /* Hide until app loads */
      body.app-loaded .loading-screen {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      body.app-loaded #app {
        opacity: 1;
        transition: opacity 0.3s ease;
      }

      #app { opacity: 0; }
    </style>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        document.body.classList.add('app-loaded');
      });

      if ('serviceWorker' in navigator && location.protocol === 'http:') {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          for (var i = 0; i < registrations.length; i++) {
            registrations[i].unregister();
          }
        });
        if ('caches' in window) {
          caches.keys().then(function (names) {
            names.forEach(function (name) {
              if (name.startsWith('nicori')) caches.delete(name);
            });
          });
        }
      }

      if ('serviceWorker' in navigator && location.protocol === 'https:') {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js')
            .then(function () {
              console.log('ServiceWorker registration successful');
            })
            .catch(function (err) {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
  </head>
  <body>
    <div class="loading-screen">
      <div class="loading-logo">
        <img src="/icons/logo.png" alt="Nicori" />
        <div class="loading-ring"></div>
      </div>
      <div class="loading-text">
        <div class="loading-title">Nicori</div>
        <div class="loading-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
