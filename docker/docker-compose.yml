services:
  client:
    build:
      context: ..
      dockerfile: docker/client/Dockerfile
    ports:
      - '80:80'
    depends_on:
      - server

  server:
    build:
      context: ..
      dockerfile: docker/server/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/aetherpulse
      - SESSION_SECRET=your-secret
      - PORT=3000
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=aetherpulse
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
