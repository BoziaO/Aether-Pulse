name: Client CI

on:
  push:
    branches: [main]
    paths: ['client/**', 'shared/**', 'package.json', 'pnpm-workspace.yaml']
  pull_request:
    branches: [main]
    paths: ['client/**', 'shared/**', 'package.json', 'pnpm-workspace.yaml']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Restore cache
        uses: actions/cache@v3
        with:
          path: node_modules
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter aetherpulse-client build
